version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    ports:
      - "3000:3000"
    volumes:
      - flowise_data:/root/.flowise
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: --config /app/config.yaml --port 4000 --num_workers 1
    depends_on:
      - ollama
    restart: unless-stopped

  doc-query-agent:
    build:
      context: ./agents/doc-query-agent
      dockerfile: Dockerfile
    container_name: doc-query-agent
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/app/docs
    depends_on:
      - litellm
      - qdrant
    restart: unless-stopped

  smart-search-agent:
    build:
      context: ./agents/smart-search-agent
      dockerfile: Dockerfile
    container_name: smart-search-agent
    ports:
      - "8082:8082"
    depends_on:
      - litellm
      - qdrant
    restart: unless-stopped

  diagnosis-agent:
    build:
      context: ./agents/diagnosis-agent
      dockerfile: Dockerfile
    container_name: diagnosis-agent
    ports:
      - "8081:8081"
    depends_on:
      - litellm
    restart: unless-stopped

  orchestrator-agent:
    build:
      context: ./agents/orchestrator-agent
      dockerfile: Dockerfile
    container_name: orchestrator-agent
    ports:
      - "8083:8083"
    environment:
      DOC_QUERY_AGENT_URL: http://doc-query-agent:8080
      DIAGNOSIS_AGENT_URL: http://diagnosis-agent:8081
      SMART_SEARCH_AGENT_URL: http://smart-search-agent:8082
    depends_on:
      - doc-query-agent
      - diagnosis-agent
      - smart-search-agent
      - litellm
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    depends_on:
      - langfuse-db
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: "cambiar-este-secreto-largo"
      NEXTAUTH_URL: "http://localhost:3001"
      SALT: "cambiar-este-salt"
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_storage:
  flowise_data:
  langfuse_db_data:
