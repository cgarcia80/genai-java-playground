model_list:
  # PRIVACIDAD: modelo local — datos nunca salen del entorno
  - model_name: llama3
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434

  # EMBEDDINGS: modelo local para RAG — datos nunca salen del entorno
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

  # CLOUD: genérico, sin datos sensibles — free tier Google AI Studio (1000 req/día)
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY"

  # CLOUD: OpenAI GPT-4o-mini (rápido y económico, ideal para pruebas)
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "os.environ/OPENAI_API_KEY"

  # CLOUD: OpenAI GPT-4o (modelo estrella de OpenAI)
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: "os.environ/OPENAI_API_KEY"

general_settings: {}
