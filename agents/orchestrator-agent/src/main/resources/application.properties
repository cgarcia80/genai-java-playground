server.port=8083

spring.application.name=orchestrator-agent

spring.ai.openai.base-url=http://litellm:4000
spring.ai.openai.api-key=no-key-needed
spring.ai.openai.chat.options.model=llama3
spring.ai.retry.max-attempts=1

agents.doc-query-agent.url=${DOC_QUERY_AGENT_URL}
agents.diagnosis-agent.url=${DIAGNOSIS_AGENT_URL}
agents.smart-search-agent.url=${SMART_SEARCH_AGENT_URL}
agents.connect-timeout=5s
agents.read-timeout=90s
