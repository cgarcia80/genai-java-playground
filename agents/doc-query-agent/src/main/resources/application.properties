server.port=8080

spring.application.name=doc-query-agent

spring.ai.openai.base-url=http://litellm:4000
spring.ai.openai.api-key=no-key-needed
spring.ai.openai.chat.options.model=llama3
spring.ai.openai.embedding.options.model=nomic-embed-text

spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=doc-query-docs
spring.ai.vectorstore.qdrant.initialize-schema=true

app.docs-path=/app/docs
app.rag.top-k=5
app.rag.chunk-size=512
app.rag.chunk-overlap=50
app.rag.similarity-threshold=0.50
